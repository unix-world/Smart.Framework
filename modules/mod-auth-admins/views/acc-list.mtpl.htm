<div id="AdminsListNavPager"></div>
<form class="ux-form"><div id="AdminsListGrid" class="slickgrid-table" style="font-size:10px;width:100%;height:10px;"></div></form>
<script>
jQuery(() => {

	// Column Formatters

	const formatter_Meta = (cellNode, row, dataContext, colDef) => {
		const s_adm = '[###IS-SUPERADM|js###]';
		const crr_id = '[###CRR-ID|js###]';
		const acc_id = dataContext['id'];
		const email = dataContext['email'];
		const fname = dataContext['name_f'];
		const lname = dataContext['name_l'];
		const active = dataContext['active'];
		let txtSt = 'Inactive';
		let btnCls = 'info';
		let icnCls = 'user-minus';
		if(active == 1) {
			txtSt = 'Active';
			btnCls = 'regular';
			icnCls = 'user-check';
		}
		let htmlOnClickAction = 'smartJ$Browser.AlertDialog(\'' + smartJ$Utils.escape_js('<div class="operation_info">You have not enough privileges.<div>This operation requires extra privileges that you currently do not own: `SuperAdmin`.</div></div>') + '\', null, \'Display Account: `' + smartJ$Utils.escape_js(smartJ$Utils.escape_html(acc_id)) + '`\'); ';
		if((s_adm == 'yes') || (crr_id === acc_id)) {
			htmlOnClickAction = 'smartJ$Browser.PopUpLink(\'' + smartJ$Utils.escape_js(itemURL + 'edit-form' +'&id=' + smartJ$Utils.escape_url(acc_id) + '&viewonly=yes') +'\', \'auth_admins_list_mod\'); ';
		}
		$(cellNode).empty().html('').append('<button class="ux-button ux-button-' + smartJ$Utils.escape_html(btnCls) + ' ux-button-xsmall" onClick="' + htmlOnClickAction + 'return false;" title="Display / Modify / Delete [' + smartJ$Utils.escape_html(txtSt) + '] Account - Click to Open"><i class="sfi sfi-' + smartJ$Utils.escape_html(icnCls) + '"></i></button>&nbsp;');
	};

	const formatter_Keys = (row, cell, value, columnDef, dataContext) => {
		if(value > 0) {
			return '<i class="sfi sfi-fa-umbrella" style="color:#778899; cursor:help;" title="Key Size: ' + smartJ$Utils.escape_html(value) + '"></i>';
		} else {
			return '<i class="sfi sfi-cancel-circle" style="color:#EEEEEE; cursor:help;" title="No Key"></i>';
		}
		return '';
	};

	const formatter_Id = (row, cell, value, columnDef, dataContext) => {
		const crr_id = '[###CRR-ID|js###]';
		const acc_id = String(value);
		let cssClass = 'smartGrid_ColId';
		if(crr_id === acc_id) {
			cssClass = 'smartGrid_ColCrrId';
		}
		return '<span class="' + smartJ$Utils.escape_html(cssClass) + '">' + smartJ$Utils.escape_html(value) + '</span>';
	}

	const formatter_Active = (row, cell, value, columnDef, dataContext) => {
		const txtDblClick = ' (Double-Click to Change)';
		if(value == 1) {
			return '<i class="sfi sfi-checkbox-checked" style="color:#6D8813; cursor:pointer;" title="Account is ENABLED' + smartJ$Utils.escape_html(txtDblClick) + '"></i>';
		} else {
			return '<i class="sfi sfi-checkbox-unchecked" style="color:#2A9DF4; cursor:pointer;" title="Account is DISABLED' + smartJ$Utils.escape_html(txtDblClick) + '"></i>';
		}
	};

	const formatter_DateTime = (row, cell, value, columnDef, dataContext) => {
		value = parseInt(value);
		if(value > 0) {
			const d = new Date(value * 1000);
			value = d.getFullYear() + '-' + ('00' + (d.getMonth() + 1)).slice(-2) + '-' + ('00' + d.getDate()).slice(-2) + ' ' + ('00' + d.getHours()).slice(-2) + ':' + ('00' + d.getMinutes()).slice(-2) + ':' + ('00' + d.getSeconds()).slice(-2);
		} else {
			value = '-';
		}
		return smartJ$Utils.escape_html(value);
	};

	const formatter_Privileges = (row, cell, value, columnDef, dataContext) => {
		return '<span style="color:#448FCE; font-size:0.8125rem; font-weight:bold;">' + smartJ$Utils.escape_html(value) + '</span>';
	};

	// Column Updaters

	const updateCellData = (url_segment_update) => {
		smartJ$Browser.SubmitFormByAjax('', '[###ACTIONS-URL|js###]edit-cell' + url_segment_update, 'yes', 'TheGrid.loadGridData(TheGrid.getOffset());', 'TheGrid.loadGridData(TheGrid.getOffset());');
	};

	// Grid Data Defs

	const columns = [
		{id:'meta', name:'', sortable:false, width:20, cssClass:'smartGrid_AlignCenter', asyncPostRender:formatter_Meta},
		{id:'keys-length', field:'keys-length', name:'Keys', sortable:false, width:20, cssClass:'smartGrid_AlignCenter', formatter:formatter_Keys},
		{id:'id', field:'id', name:'ID', sortable:true, width:75, cssClass:'smartGrid_Important', editor:TextCellSelector, formatter:formatter_Id},
		{id:'active', field:'active', name:'Active', sortable:true, sortNumeric:true, width:30, cssClass:'smartGrid_AlignCenter', formatter:formatter_Active, editor:CheckboxCellEditor},
		{id:'email', field:'email', name:'Email', sortable:true, width:100, cssClass:'smartGrid_ColEmail smartGrid_Important', editor:TextCellSelector},
		{id:'name_f', field:'name_f', name:'First name', sortable:true, width:70, cssClass:'smartGrid_ColName', editor:TextCellSelector},
		{id:'name_l', field:'name_l', name:'Last name', sortable:true, width:70, cssClass:'smartGrid_ColName', editor:TextCellSelector},
		{id:'modif', field:'modif', name:'Modified', sortable:true, sortNumeric:true, width:50, cssClass:'smartGrid_ColDate smartGrid_AlignCenter', formatter:formatter_DateTime},
		{id:'priv', field:'priv', name:'Privileges', sortable:false, width:125, editor:TextCellSelector, formatter:formatter_Privileges},
	];

	// Grid Options

	const options = {
		enableAddRow: false,
		enableCellNavigation: true,
		enableColumnReorder: false,
		enableAsyncPostRender: true,
		forceFitColumns: false,
		asyncPostRenderDelay: 15,
		rowHeight: 26,
		editable: true,
		autoEdit: false,
		asyncEditorLoading: false,
	};

	// Grid sizing

	let winW = $(window).width();
	let winH = $(window).height();
	$('#' + IdOfGrid).css({ 'width': parseInt(winW - 25), 'height': parseInt(winH - 160) });
	$(window).resize(function() {
		winW = $(window).width();
		winH = $(window).height();
		$('#' + IdOfGrid).css({ 'width': parseInt(winW - 25), 'height': parseInt(winH - 160) });
		TheGrid.grid.resizeCanvas();
		TheGrid.grid.autosizeColumns();
	});

	// Grid Runtime

	TheGrid.initNavPager('AdminsListNavPager');
	TheGrid.initGrid(columns, options);
	TheGrid.grid.onCellChange = (row, cell, dataContext, columnDef) => {
		switch(columnDef.field) {
			case 'active':
				updateCellData('&column=' + smartJ$Utils.escape_url(columnDef.field) + '&value=' + smartJ$Utils.escape_url(dataContext[columnDef.field]) + '&id=' + smartJ$Utils.escape_url(dataContext['id']));
				break;
			default: // invalid
				console.log('WARNING: Table Column is not editable: ' + columnDef.field);
		}
	};
	TheGrid.grid.resizeCanvas();
	TheGrid.grid.autosizeColumns();
	TheGrid.loadGridData(0);

	// #

});
//--
</script>
