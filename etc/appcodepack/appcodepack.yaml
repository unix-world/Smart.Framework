# [@[#[!SF.DEV-ONLY!]#]@] ; do not remove this line, it is for safety to dissalow this file to be send in a release package
# appcodepack.yaml s.20210514.1510 ; sample: MINIFY
APP-RELEASE:
	# the app ID
	smart-framework.local:
		# the app deploy strategy: `minify` or `comments`
		deploy-strategy: minify
		# the app deploy urls ; use http:// on your own risk ; for safety try to use https://
		deploy-urls:
			- https://127.0.0.1/test-unpack/appcodeunpack.php
			- http://localhost/test-unpack2/appcodeunpack.php
		# the app deploy secret ; used to calculate the AppID-Hash for Deploy ; must be between 40 and 128 characters ; can contain only ASCII characters, except spaces ; default is: `set-here-a-private-key-that-must-not-be-disclosed`
		deploy-secret: set-here-a-private-key-that-must-not-be-disclosed
		# the app deploy auth username ; default is: `admin`
		deploy-auth-user: admin
		# the app unpack auth password, blowfish CBC encrypted, using SmartUtils::crypto_blowfish_encrypt('choose-another-password...') which by default encrypts it using the SMART_FRAMEWORK_SECURITY_KEY ; if you ever change the SMART_FRAMEWORK_SECURITY_KEY this need to be re-generated ; default is: `the-pass`
		deploy-auth-pass: 5A05719BCAF965E8DC3C412EC83D69A1D3D1BF9BB587A1D3A3CBF7D1D9EAD13D300B70D1EEFBDC03C57487D66B6D045A4CFE7279519B6F93E08B9B54CBA42A1700DFC901949CFE36
		# list of folders to include or exclude
		folders:
			- _sql ; =sql
			- _sql/postgresql ; !skip
			- etc
			- etc/appcodepack ; !skip
			- lib
			- modules/app
			- modules/mod-auth-admins
			- modules/mod-webdav
			- modules/mod-samples
		# list of files to include or exclude
		files:
			- LICENSE ; !skip
			- _sql/sf-dev-only.nopack ; !skip
			- etc/license_bsd.txt ; =etc/license-bsd.txt
			- modules/index.html
			- .htaccess
			- index.php
			- admin.php
			- task.php
			- README.md ; = readme.md
			- modules/mod-app-release/appcodeunpack/samples/maintenance-503.html ; =maintenance.html
			- modules/mod-app-release/appcodeunpack/samples/appcode-upgrade.php ; =appcode-upgrade.php
# END
