<!-- TPL Foot r.20210503 -->
[%%%IF:SEMAPHORE:&*<load:searchterm-highlight-js>;%%%]
<!-- Highlight SearchTerm -->
<style>
.searchterm_highlight {
	background-color: #FFCC00 !important;
	color: #222222 !important;
	padding: 0 !important;
	border-radius: 3px !important;
}
</style>
<link rel="stylesheet" type="text/css" href="lib/js/jquery/jquery.highlight.css?[###RELEASE-HASH|url|html###]">
<script src="lib/js/jquery/jquery.highlight.js?[###RELEASE-HASH|url|html###]"></script>
<script>
jQuery(() => {
	if((typeof(searchTerm) != 'undefined') && (searchTerm != null) && (searchTerm != '')) {
		jQuery('.search-highlight').removeHighlight('searchterm_highlight').highlight(String(searchTerm), 'searchterm_highlight');
	} //end if
});
</script>
[%%%ELSE:SEMAPHORE%%%]
<!-- Highlight SearchTerm: skip by Semaphore -->
[%%%/IF:SEMAPHORE%%%]
[%%%IF:SEMAPHORE:&*<load:code-highlight-js>;%%%]
[@@@SUB-TEMPLATE:!etc/templates/default/js-hljs.inc.htm!@@@]
[%%%ELSE:SEMAPHORE%%%]
<!-- HLjs, Smart HLjs: skip by Semaphore -->
[%%%/IF:SEMAPHORE%%%]
[%%%IF:SEMAPHORE:&*<skip:unveil-js>;%%%]
<!-- Unveil: skip by Semaphore -->
[%%%ELSE:SEMAPHORE%%%]
<!-- Unveil -->
<script src="lib/js/jquery/jquery.unveil.js?[###RELEASE-HASH|url|html###]"></script>
<script>
jQuery(() => {
	jQuery(window).on('refreshunveil', () => { jQuery('.unveil').off('unveil').unveil(); });
	setTimeout(() => { jQuery(window).trigger('refreshunveil'); }, 250); // call for init or dom changes that include unveil elements (can include also unhide unveil elements)
	//jQuery(window).trigger('lookup'); // call after unhide unveil elements
});
</script>
[%%%/IF:SEMAPHORE%%%]
