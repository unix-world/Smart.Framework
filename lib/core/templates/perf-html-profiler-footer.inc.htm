<!-- HTML Performance Profiler (footer) # [mode = [###MODE|html###]] # r.20210314 -->
<script>
(function(){

	var mode = '[###MODE|js###]';
	var theEndMark = 'Smart.Framework.HTML.Performance.Profiler.Page.Render.DONE';

	if(window.performance) {
		window.performance.mark(theEndMark);
	}

	var theNavUrl = '';
	var timeTotalResources = 0;
	var theTimeLoadingLastResource = 0;
	var theTimeFirstPaint = 0;
	var theTimeFirstContentfulPaint = 0;
	var theTimeRenderDone = 0;

	var processPerformanceEntry = function(obj) {

		// var properties = ['name', 'entryType', 'startTime', 'duration'];
		// var methods = ['toJSON'];

		if((!obj) || (obj === null) || (typeof obj !== 'object')) {
			return;
		}

		if(!obj['entryType']) {
			return;
		}
		var entryType = String(obj['entryType'] || '');

		var name = String(obj['name'] || '');

		var startTime = parseInt(obj['startTime'] || 0);
		if(!isFinite(startTime) || isNaN(startTime)) {
			startTime = 0;
		}

		var duration = parseInt(obj['duration'] || 0);
		if(!isFinite(duration) || isNaN(duration)) {
			duration = 0;
		}

		switch(entryType.toLowerCase()) {
			case 'navigation':
				theNavUrl = name;
				break;
			case 'resource':
				timeTotalResources += duration;
				if(startTime >= theTimeLoadingLastResource) {
					theTimeLoadingLastResource = startTime;
				}
				break;
			case 'paint':
				if(name.toLowerCase() === 'first-paint') {
					if(startTime >= theTimeFirstPaint) {
						theTimeFirstPaint = startTime;
					}
				} else if(name.toLowerCase() === 'first-contentful-paint') {
					if(startTime >= theTimeFirstContentfulPaint) {
						theTimeFirstContentfulPaint = startTime;
					}
				}
				break;
			case 'mark':
				if(name === theEndMark) {
					if(startTime >= theTimeRenderDone) {
						theTimeRenderDone = startTime;
					}
				}
				break;
			default:
				// nothing to do ...
		}

	}

	var displayLocalNumber = function(num) {
		var lNum;
		try {
			lNum = num.toLocaleString('en-US', { minimumFractionDigits:1 });
		} catch(err) {
			lNum = num;
		}
		return lNum;
	}

	var theLog = [];

	theLog[theLog.length] = '----- Smart.Framework HTML Performance Profiler LOG: START# -----';

	if(!window.performance) {
		theLog[theLog.length] = '    - N/A';
	} else {
		var p = window.performance.getEntries();
		for(var i=0; i < p.length; i++) {
			processPerformanceEntry(p[i]);
		}
		var estimationOffset = 1.5;
		theLog[theLog.length] = '    - Navigation URL: `' + theNavUrl + '`';
		theLog[theLog.length] = '    - Page Render Start at: ' + theTimeLoadingLastResource + ' ms';
		theLog[theLog.length] = '    - First Paint at: ' + ((theTimeFirstPaint ? displayLocalNumber(theTimeFirstPaint) + ' ms' : displayLocalNumber(theTimeLoadingLastResource + estimationOffset) + ' ms (estimated)'));
		theLog[theLog.length] = '    - First Contentful Paint at: ' + ((theTimeFirstContentfulPaint ? displayLocalNumber(theTimeFirstContentfulPaint) + ' ms' : displayLocalNumber(theTimeLoadingLastResource + estimationOffset) + ' ms (estimated)'));
		theLog[theLog.length] = '    - Page Render completed in: ' + displayLocalNumber(theTimeRenderDone) + ' ms';
		if(timeTotalResources > 0) {
			theLog[theLog.length] = '    - Background Loading Page Resources (CSS, JS, Media) completed in: ' + displayLocalNumber(timeTotalResources) + ' ms';
		}
		theLog[theLog.length] = '    - TOTAL PAGE TIME: ' + displayLocalNumber(theTimeRenderDone + timeTotalResources) + ' ms';
	}

	theLog[theLog.length] = '----- Smart.Framework HTML Performance Profiler LOG: #END -----';

	console.log(theLog.join('\n'));

	if(mode === 'dev') {
		theLog[1] = '    - Navigation URL (see in the browser addressbar)'; // clear Navigation URL
		try {
			document.write('<div onClick="this.style.visibility=\'hidden\';" title="Smart.Framework.HTML.Performance.Profiler @ Mode: `[###MODE|html|js###]`\nClick on this info message to hide it ..." style="cursor:default; position:fixed; bottom:25px; right:25px; padding:10px; background:#FF3300; color:#FFFFFF; font-weight:bold; font-size:1rem; opacity:0.5; border-radius:3px;">*** This info message is displayed just in DEV mode. ***<br>Smart.Framework.HTML.Performance.Profiler is ENABLED.<br>Performance metrics are logged in the Browser Console ...<pre id="Smart.Framework.HTML.Performance.Profiler.Log"></pre></div>');
			setTimeout(function(){ document.getElementById('Smart.Framework.HTML.Performance.Profiler.Log').innerText = theLog.join('\n'); }, 250);
		} catch(err){}
	}

})();
</script>
